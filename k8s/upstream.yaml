apiVersion: apps/v1
kind: Deployment
metadata:
  name: upstream
  namespace: poc
  labels:
    app: upstream
spec:
  replicas: 1
  selector:
    matchLabels:
      app: upstream
  template:
    metadata:
      labels:
        app: upstream
    spec:
      containers:
        - name: upstream
          image: poc-upstream:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: upstream
  namespace: poc
spec:
  selector:
    app: upstream
  ports:
    - port: 8080
      targetPort: 8080

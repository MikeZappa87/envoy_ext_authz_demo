# Kind cluster configuration
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      # Envoy HTTPS ingress
      - containerPort: 30443
        hostPort: 8443
        protocol: TCP
      # Envoy CONNECT proxy
      - containerPort: 30444
        hostPort: 8444
        protocol: TCP
      # Envoy MITM HTTPS inspection proxy
      - containerPort: 30445
        hostPort: 8445
        protocol: TCP

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ext-proc
  namespace: poc
  labels:
    app: ext-proc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ext-proc
  template:
    metadata:
      labels:
        app: ext-proc
    spec:
      containers:
        - name: ext-proc
          image: poc-ext-proc:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9192
---
apiVersion: v1
kind: Service
metadata:
  name: ext-proc
  namespace: poc
spec:
  selector:
    app: ext-proc
  ports:
    - port: 9192
      targetPort: 9192

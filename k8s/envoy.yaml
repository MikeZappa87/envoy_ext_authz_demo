# envoy.yaml for Kubernetes — services resolved via cluster DNS
#
# Both ext_authz and ext_proc point to a single "policyengine" service.
static_resources:
  listeners:
    - name: ingress
      address:
        socket_address: { address: 0.0.0.0, port_value: 8443 }
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              require_client_certificate: true
              common_tls_context:
                tls_params:
                  tls_minimum_protocol_version: TLSv1_3
                  tls_maximum_protocol_version: TLSv1_3
                alpn_protocols: ["h2"]
                tls_certificates:
                  - certificate_chain: { filename: "/etc/envoy/certs/server.crt" }
                    private_key:       { filename: "/etc/envoy/certs/server.key" }
                validation_context:
                  trusted_ca: { filename: "/etc/envoy/certs/ca.crt" }
                  match_typed_subject_alt_names:
                    - san_type: URI
                      matcher:
                        prefix: "spiffe://poc/"
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress
                http_filters:
                  # 1. Authorization — identity + path ACL
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      grpc_service:
                        envoy_grpc:
                          cluster_name: policyengine_cluster
                        timeout: 2s
                      transport_api_version: V3
                      include_peer_certificate: true
                      failure_mode_allow: false
                  # 2. Processing — header validation + body inspection
                  - name: envoy.filters.http.ext_proc
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                      grpc_service:
                        envoy_grpc:
                          cluster_name: policyengine_cluster
                        timeout: 2s
                      processing_mode:
                        request_header_mode: SEND
                        request_body_mode: BUFFERED
                        response_header_mode: SEND
                        response_body_mode: NONE
                  # 3. Router
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: upstream_cluster }

    # ---- HTTP/2 CONNECT proxy listener ------------------------------------
    - name: connect_proxy
      address:
        socket_address: { address: 0.0.0.0, port_value: 8444 }
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              require_client_certificate: true
              common_tls_context:
                tls_params:
                  tls_minimum_protocol_version: TLSv1_3
                  tls_maximum_protocol_version: TLSv1_3
                alpn_protocols: ["h2"]
                tls_certificates:
                  - certificate_chain: { filename: "/etc/envoy/certs/server.crt" }
                    private_key:       { filename: "/etc/envoy/certs/server.key" }
                validation_context:
                  trusted_ca: { filename: "/etc/envoy/certs/ca.crt" }
                  match_typed_subject_alt_names:
                    - san_type: URI
                      matcher:
                        prefix: "spiffe://poc/"
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: connect_proxy
                http2_protocol_options:
                  allow_connect: true
                  max_concurrent_streams: 100
                  connection_keepalive:
                    interval: 10s
                    timeout: 20s
                upgrade_configs:
                  - upgrade_type: CONNECT
                http_filters:
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      grpc_service:
                        envoy_grpc:
                          cluster_name: policyengine_cluster
                        timeout: 2s
                      transport_api_version: V3
                      include_peer_certificate: true
                      failure_mode_allow: false
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: connect_route
                  virtual_hosts:
                    - name: connect
                      domains: ["*"]
                      routes:
                        - match:
                            connect_matcher: {}
                          route:
                            cluster: mitm_cluster
                            upgrade_configs:
                              - upgrade_type: CONNECT
                                connect_config: {}

    # ---- MITM HTTPS inspection listener (TLS interception) ----------------
    - name: mitm_connect_proxy
      address:
        socket_address: { address: 0.0.0.0, port_value: 8445 }
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              require_client_certificate: true
              common_tls_context:
                tls_params:
                  tls_minimum_protocol_version: TLSv1_3
                  tls_maximum_protocol_version: TLSv1_3
                alpn_protocols: ["h2"]
                tls_certificates:
                  - certificate_chain: { filename: "/etc/envoy/certs/server.crt" }
                    private_key:       { filename: "/etc/envoy/certs/server.key" }
                validation_context:
                  trusted_ca: { filename: "/etc/envoy/certs/ca.crt" }
                  match_typed_subject_alt_names:
                    - san_type: URI
                      matcher:
                        prefix: "spiffe://poc/"
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: mitm_connect
                http2_protocol_options:
                  allow_connect: true
                  max_concurrent_streams: 100
                  connection_keepalive:
                    interval: 10s
                    timeout: 20s
                upgrade_configs:
                  - upgrade_type: CONNECT
                http_filters:
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      grpc_service:
                        envoy_grpc:
                          cluster_name: policyengine_cluster
                        timeout: 2s
                      transport_api_version: V3
                      include_peer_certificate: true
                      failure_mode_allow: false
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: mitm_route
                  virtual_hosts:
                    - name: mitm
                      domains: ["*"]
                      routes:
                        - match:
                            connect_matcher: {}
                          route:
                            cluster: mitm_cluster
                            upgrade_configs:
                              - upgrade_type: CONNECT
                                connect_config: {}

  clusters:
    - name: policyengine_cluster
      type: STRICT_DNS
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: policyengine_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: policyengine.poc.svc.cluster.local, port_value: 9191 }

    - name: upstream_cluster
      type: STRICT_DNS
      load_assignment:
        cluster_name: upstream_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: upstream.poc.svc.cluster.local, port_value: 8080 }

    - name: mitm_cluster
      type: STRICT_DNS
      transport_socket:
        name: envoy.transport_sockets.upstream_proxy_protocol
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.proxy_protocol.v3.ProxyProtocolUpstreamTransport
          config:
            version: V1
          transport_socket:
            name: envoy.transport_sockets.raw_buffer
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.raw_buffer.v3.RawBuffer
      load_assignment:
        cluster_name: mitm_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: policyengine.poc.svc.cluster.local, port_value: 9192 }

admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }

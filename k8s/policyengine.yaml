apiVersion: apps/v1
kind: Deployment
metadata:
  name: policyengine
  namespace: poc
  labels:
    app: policyengine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policyengine
  template:
    metadata:
      labels:
        app: policyengine
    spec:
      serviceAccountName: policyengine
      containers:
        - name: policyengine
          image: poc-policyengine:latest
          imagePullPolicy: Never
          args: ["--crd", "--mitm-ca-cert=/etc/mitm/certs/proxy-ca.crt", "--mitm-ca-key=/etc/mitm/certs/proxy-ca.key"]
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 9191
            - containerPort: 9192
          volumeMounts:
            - name: proxy-ca
              mountPath: /etc/mitm/certs
              readOnly: true
      volumes:
        - name: proxy-ca
          secret:
            secretName: proxy-ca-certs
---
apiVersion: v1
kind: Service
metadata:
  name: policyengine
  namespace: poc
spec:
  selector:
    app: policyengine
  ports:
    - name: grpc
      port: 9191
      targetPort: 9191
    - name: mitm
      port: 9192
      targetPort: 9192

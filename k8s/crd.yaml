apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: policies.policy.poc.io
spec:
  group: policy.poc.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [type, order]
              properties:
                type:
                  type: string
                  enum: [spiffe, path-acl, header-validate, header-inject, body-inspect, opa]
                order:
                  type: integer
                config:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Order
          type: integer
          jsonPath: .spec.order
  scope: Namespaced
  names:
    plural: policies
    singular: policy
    kind: Policy
    shortNames: [pol]
